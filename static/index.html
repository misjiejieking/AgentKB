<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentKB — 个人知识助手</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/marked.min.js"></script>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="8" y1="7" x2="16" y2="7"/>
          <line x1="8" y1="11" x2="13" y2="11"/>
        </svg>
        <span>AgentKB</span>
      </div>
      <button class="btn-new-chat" id="btn-new-chat" title="新建会话">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>新会话</span>
      </button>
    </div>

    <!-- 知识库概览 -->
    <div class="sidebar-section">
      <div class="section-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        知识库
        <span class="section-count" id="kb-count">0</span>
      </div>
      <div class="kb-file-list" id="kb-file-list">
        <div class="kb-empty">
          <span>暂无文件</span>
          <button class="kb-upload-hint" onclick="document.getElementById('upload-input').click()">
            + 上传文件
          </button>
        </div>
      </div>
    </div>

    <!-- 会话历史 -->
    <div class="sidebar-section session-section">
      <div class="section-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        历史会话
      </div>
      <div class="session-list" id="session-list">
        <div class="session-empty">暂无会话</div>
      </div>
    </div>

    <!-- 用户信息 -->
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">U</div>
        <div class="user-meta">
          <div class="user-name" id="user-name">本地用户</div>
          <div class="user-status">本地模式</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- 主区域 -->
  <div class="main-area">
    <!-- 顶部栏 -->
    <header class="topbar">
      <button class="btn-sidebar-toggle" id="btn-toggle-sidebar" title="收起侧边栏">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <div class="current-session-title" id="current-session-title">New Chat</div>
      <div class="topbar-actions">
        <button class="btn-icon" id="btn-upload" title="上传文件">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="btn-icon" id="btn-clear" title="清空会话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        </button>
      </div>
    </header>

    <!-- 聊天区 -->
    <div class="chat-container" id="chat">
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
        <h2>个人知识助手</h2>
        <p class="welcome-desc">上传你的 Markdown 或文本笔记，用自然语言向你的知识库提问。</p>
        <div class="welcome-hints">
          <button class="hint-chip" data-text="总结我已上传的所有知识">📝 总结我的知识库</button>
          <button class="hint-chip" data-text="帮我搜索关于项目架构的信息">🔍 搜索项目架构</button>
          <button class="hint-chip" data-text="最近上传的文件有哪些？">📂 查看最近文件</button>
        </div>
      </div>
    </div>

    <!-- 底部输入区 -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="msg-input"
          placeholder="向你的知识库提问…… (Enter 发送，Shift+Enter 换行)"
          rows="1"
        ></textarea>
        <button class="btn-send" id="send-btn" title="发送">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">回答由本地 Agent 生成，可能存在不准确之处。</div>
    </div>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="upload-input" accept=".md,.txt,.pdf,.docx,.csv,.json" multiple hidden>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
