name: Eval Regression Check

on:
  pull_request:
    paths:
      - 'src/agentkb/knowledge/**'
      - 'src/agentkb/tools/knowledge_search.py'
      - 'src/agentkb/agents/**'
      - 'src/agentkb/eval/**'
      - 'data/eval/testset.json'
      - 'data/eval/baseline.json'
  push:
    branches: [main]
    paths:
      - 'src/agentkb/knowledge/**'
      - 'src/agentkb/tools/knowledge_search.py'
      - 'src/agentkb/agents/**'
      - 'src/agentkb/eval/**'

jobs:
  eval:
    # 本地模型和评估语料不上传云端，门禁在具备完整评估环境的 Runner 执行。
    runs-on: [self-hosted, agentkb-eval]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Validate evaluation assets
        run: python -c "from pathlib import Path; assert Path('data/eval/testset.json').is_file(); assert Path('data/eval/baseline.json').is_file()"

      - name: Run eval with baseline check
        run: python -m agentkb.eval run --output data/eval/ci_eval.json --gate-baseline data/eval/baseline.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: |
            data/eval/ci_eval.json
            data/eval/ci_eval.md
            data/eval/ci_eval.gate.json
