app:
  auto_open_browser: true
  host: 127.0.0.1
  port: 8000
chunking:
  child_size: 256
  parent_size: 1024
  semantic_threshold: 0.5
  sliding_overlap: 100
  sliding_size: 512
embedding:
  batch_size: 32
  device: auto
  model_name: BAAI/bge-m3
  normalize: true
eval:
  generation_sample_size: 50
  questions_per_chunk: 2
  retrieval_k_values:
  - 5
  - 10
  - 20
  testset_path: data/eval/testset.json
knowledge:
  max_file_size_mb: 10
  supported_extensions:
  - .md
  - .txt
  - .pdf
  - .docx
  - .csv
  - .json
  - .png
  - .jpg
  - .jpeg
  - .webp
knowledge_graph:
  enabled: true
  max_chunks_per_file: 80
  min_chunk_chars: 80
llm:
  provider: ollama
  providers:
    ollama:
      protocol: ollama
      base_url: http://localhost:11434
      api_key: ""
      router_model_name: qwen2.5:7b
      generator_model_name: qwen2.5:7b
    deepseek:
      protocol: openai
      base_url: https://api.deepseek.com/v1
      api_key: ""
      router_model_name: deepseek-chat
      generator_model_name: deepseek-chat
    openai:
      protocol: openai
      base_url: https://api.openai.com/v1
      api_key: ""
      router_model_name: gpt-4.1-mini
      generator_model_name: gpt-4.1
  max_tokens: 4096
  request_timeout: 120
  temperature: 0.1
multimodal:
  vision:
    enabled: true
    provider: ollama
    model_name: qwen2.5vl:7b
    max_image_size_mb: 10
    pdf_visual_analysis: false
    pdf_max_pages: 12
  transcription:
    enabled: false
    base_url: http://127.0.0.1:8001/v1
    model_name: whisper-1
    api_key: ""
    max_audio_size_mb: 25
logging:
  console: true
  file: data/logs/agentkb.log
  level: INFO
  retention: 7 days
  rotation: 10 MB
postgresql:
  dbname: agentkb
  host: 127.0.0.1
  password: postgres
  pool_max: 5
  pool_min: 2
  port: 5432
  user: postgres
reranker:
  provider: "local"
  model_name: "D:/ai-models/BAAI/bge-reranker-v2-m3"
  base_url: "https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank"
  api_key: ""
  timeout: 30
retrieval:
  bm25_weight: 0.4
  candidate_k: 30
  dense_weight: 0.6
  final_k: 5
  rrf_k: 60
# 可观测性
observability:
  enabled: true
  exporters:
    - console
    - file
    - postgresql
    # - langfuse
    # - langsmith
  langfuse:
    public_key: ""
    secret_key: ""
    host: "https://cloud.langfuse.com"
  langsmith:
    api_key: ""
    project: "agentkb"

# 记忆系统
memory:
  working_memory_max_turns: 10
  long_term_enabled: true
  long_term_min_importance: 0.6

# MCP 服务配置通过管理界面持久化；密钥值使用 ${ENV_VAR} 引用。
mcp:
  enabled: true

web_search:
  enabled: true
  max_results: 5
  timeout: 10
