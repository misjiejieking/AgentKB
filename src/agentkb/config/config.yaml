app:
  auto_open_browser: true
  debug: false
  host: 127.0.0.1
  name: Knowledge Agent
  port: 8000
  version: 0.2.0
chunking:
  child_size: 256
  parent_size: 1024
  semantic_threshold: 0.5
  sliding_overlap: 100
  sliding_size: 512
embedding:
  batch_size: 32
  device: cpu
  dimension: 1024
  model_name: BAAI/bge-m3
  normalize: true
eval:
  generation_sample_size: 50
  judge_model: qwen2.5:7b
  questions_per_chunk: 2
  report_dir: data/eval/reports
  retrieval_k_values:
  - 5
  - 10
  - 20
  testset_path: data/eval/testset.json
knowledge:
  max_file_size_mb: 10
  supported_extensions:
  - .md
  - .txt
  - .pdf
  - .docx
  - .csv
  - .json
langgraph:
  checkpointer_db: data/checkpoints.db
  max_recursion_limit: 10
llm:
  base_url: http://localhost:11434
  max_tokens: 4096
  model_name: qwen2.5:7b
  openai_api_key: ''
  openai_base_url: ''
  provider: ollama
  request_timeout: 120
  streaming: true
  temperature: 0.1
logging:
  console: true
  file: data/logs/agentkb.log
  level: INFO
  log_tool_calls: true
  retention: 7 days
  rotation: 10 MB
postgresql:
  dbname: agentkb
  host: 127.0.0.1
  password: postgres
  pool_max: 5
  pool_min: 2
  port: 5432
  user: postgres
reranker:
  provider: "local"
  model_name: "D:/ai-models/BAAI/bge-reranker-v2-m3"
retrieval:
  bm25_weight: 0.4
  candidate_k: 30
  dense_weight: 0.6
  final_k: 5
  rrf_k: 60
web_search:
  enabled: true
  engine: duckduckgo
  max_results: 5
  timeout: 10
